workflow:
  name: "自动代码修复（Demo）"
  agents:
    - name: planner
      role: 架构师
    - name: coder
      role: 开发者
    - name: tester
      role: 测试员
    - name: reviewer
      role: 审查员
  flow:
    - id: plan
      agent: planner
      input: "分析需求并制定修复计划"
    - id: code
      agent: coder
      dependencies: ["plan"]
      input: "根据计划编写代码补丁"
    - id: test
      agent: tester
      dependencies: ["code"]
      input: "运行测试并输出结果"
    - id: review
      agent: reviewer
      dependencies: ["test"]
      input: "审查代码质量"
